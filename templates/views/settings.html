<!-- 8. CONFIGURATION SETTINGS VIEW -->
<div id="view-settings" class="app-view">
    <div class="profile-shell">
        <div class="profile-grid">
            <div class="card ep-card profile-panel p-4 bg-white">
                <h4 class="fw-bold mb-4">My Profile</h4>

                <form id="formProfileDetails" class="profile-form">
                    <div class="mb-3">
                        <label class="form-label ep-label">Username</label>
                        <input type="text" class="form-control" id="profileUsername" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label ep-label">Email</label>
                        <input type="email" class="form-control" id="profileEmail" placeholder="admin@company.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label ep-label">Display Name</label>
                        <input type="text" class="form-control" id="profileDisplayName" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2">Update Profile</button>
                </form>
            </div>

            <div class="card ep-card profile-panel p-4 bg-white">
                <h4 class="fw-bold mb-4">Change Password</h4>

                <form id="formChangePassword" class="profile-form" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label ep-label">Current Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control border-end-0" id="currentPassword" autocomplete="new-password" value="" data-lpignore="true" required>
                            <span class="input-group-text bg-white border-start-0 cursor-pointer toggle-password" data-target="#currentPassword" style="cursor: pointer;">
                                <i data-lucide="eye" style="width:16px;height:16px;"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label ep-label">New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control border-end-0" id="newPassword" autocomplete="new-password" value="" data-lpignore="true" minlength="6" required>
                            <span class="input-group-text bg-white border-start-0 cursor-pointer toggle-password" data-target="#newPassword" style="cursor: pointer;">
                                <i data-lucide="eye" style="width:16px;height:16px;"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label ep-label">Confirm New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control border-end-0" id="confirmNewPassword" autocomplete="new-password" value="" data-lpignore="true" minlength="6" required>
                            <span class="input-group-text bg-white border-start-0 cursor-pointer toggle-password" data-target="#confirmNewPassword" style="cursor: pointer;">
                                <i data-lucide="eye" style="width:16px;height:16px;"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-auto">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
