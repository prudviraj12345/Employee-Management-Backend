<!-- 5. SEND EMAIL SYSTEM INTERFACE COMPONENT -->
<div id="view-send-email" class="app-view send-email-view">
    <div class="ep-page-head">
        <div>
            <span class="ep-eyebrow">Compose &amp; Dispatch</span>
            <h4 class="ep-page-title m-0">Send Email</h4>
        </div>
    </div>

    <div class="send-email-grid">
        <div class="send-email-panel">
            <div class="card ep-card p-4 bg-white h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold m-0" style="color:var(--primary);">All Employees</h4>

                    <div class="dropdown">
                        <button class="btn btn-light border rounded-4 px-4 py-2 dropdown-toggle" id="sendEmailFilterBtn" data-bs-toggle="dropdown">
                            Filter
                        </button>

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item dept-filter" href="#" data-dept="all">All Departments</a></li>
                        </ul>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text bg-white border-end-0">
                        <i data-lucide="search" style="width:14px;height:14px;"></i>
                    </span>
                    <input type="text" class="form-control border-start-0" placeholder="Search employee..." id="employeeSearch">
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <span id="selectedCount" class="mono small text-muted">0 selected</span>

                    <div>
                        <a href="#" class="text-decoration-none fw-semibold" style="color:var(--primary);" id="selectAllBtn">Select all</a>
                        <span class="mx-2 text-muted">&middot;</span>
                        <a href="#" class="text-decoration-none fw-semibold" style="color:var(--primary);" id="clearAllBtn">Clear selection</a>
                    </div>
                </div>

                <div class="recipient-list">
                    <div class="text-center text-muted py-4">Loading employees...</div>
                </div>
            </div>
        </div>

        <div class="send-email-panel">
            <div class="card ep-card compose-card p-4 bg-white h-100">
                <h5 class="fw-bold mb-4">Content Construction</h5>

                <form id="formSendMail">
                    <div class="mb-3">
                        <label class="form-label">Template</label>
                        <select class="form-select" id="emailTemplate">
                            <option value="">Select Template</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-control" id="emailSubject" placeholder="Enter email subject">
                    </div>

                    <div class="message-form-group">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" id="emailMessage" placeholder="Write your message"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Attachment</label>
                        <input type="file" class="form-control" id="emailAttachment">
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-outline-secondary me-2" id="emailPreviewBtn">Preview</button>
                        <button type="submit" class="btn btn-success">Send Email</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
